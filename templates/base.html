<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{ title or "Scentora" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="body-bg">

  <nav class="navbar navbar-expand-lg shadow-sm sticky-top navfoot-bg" id="navbar">
    <div class="container">

      <a class="navbar-brand fw-bold fs-4" href="{{ url_for('index') }}">Scentora</a>

      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">

        <!-- Left: Shop link -->
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link fw-semibold" href="{{ url_for('index') }}">Shop</a>
          </li>
        </ul>

        <!-- Right: all actions in one flex row, wraps neatly on mobile -->
        <div class="nav-actions d-flex flex-wrap gap-2 py-2 py-lg-0">

          {% if current_user.is_authenticated %}
            <a class="btn btn-outline-brand btn-sm" href="{{ url_for('account_orders') }}">My Orders</a>
            <a class="btn btn-outline-brand btn-sm" href="{{ url_for('client_logout') }}">Logout</a>
          {% else %}
            <a class="btn btn-outline-brand btn-sm" href="{{ url_for('client_login') }}">Login</a>
            <a class="btn btn-brand btn-sm" href="{{ url_for('client_register') }}">Register</a>
          {% endif %}

          {% if session.get("is_admin") %}
            <a class="btn btn-outline-brand btn-sm" href="{{ url_for('admin_dashboard') }}">Admin</a>
            <a class="btn btn-brand btn-sm" href="{{ url_for('admin_logout') }}">Admin Logout</a>
          {% else %}
            <a class="btn btn-outline-brand btn-sm" href="{{ url_for('admin_login') }}">Admin</a>
          {% endif %}

        </div>
      </div>

    </div>
  </nav>

  <main class="container py-3 py-md-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="navfoot-bg mt-5 py-4">
    <div class="container text-center">
      <div class="fw-semibold mb-1">© 2026 Scentora</div>
      <small class="text-muted">For more info, contact +961 81 274 950</small>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card p-3 p-md-4">
      <h3 class="fw-bold">✅ Order Received</h3>
      <p class="text-muted small">We'll contact you to confirm delivery.</p>

      <div class="alert alert-success mb-3">
        Your order number is <b>#{{ order.id }}</b>.
      </div>

      <div class="border rounded-3 p-3 bg-white">
        <div class="fw-semibold">{{ product.name }}</div>
        <div class="small mt-1">Status: <b>{{ order.status }}</b></div>
        <div class="text-muted small">Cash on delivery</div>
      </div>

      <a class="btn btn-outline-brand mt-3" href="{{ url_for('index') }}">Back to products</a>
    </div>
  </div>
</div>
{% endblock %}

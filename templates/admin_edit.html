{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-7">
    <div class="card p-3 p-md-4">
      <h3 class="fw-bold mb-3">Edit Product</h3>
      <form method="POST" enctype="multipart/form-data" class="d-grid gap-3">
        <div>
          <label class="form-label fw-semibold">Name</label>
          <input class="form-control" name="name" value="{{ product.name }}" required>
        </div>
        <div>
          <label class="form-label fw-semibold">Category</label>
          <input class="form-control" name="category" value="{{ product.category }}" required>
        </div>
        <div class="row g-2">
          <div class="col-6">
            <label class="form-label fw-semibold">Price</label>
            <input class="form-control" name="price" value="{{ product.price or '' }}">
          </div>
          <div class="col-6">
            <label class="form-label fw-semibold">Quantity</label>
            <input class="form-control" name="quantity" value="{{ product.quantity }}">
          </div>
        </div>
        <div>
          <label class="form-label fw-semibold">Upload New Image</label>
          <input class="form-control" type="file" name="image">
        </div>
        <div>
          <label class="form-label fw-semibold">Description</label>
          <textarea class="form-control" name="description" rows="4">{{ product.description or '' }}</textarea>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-brand">Save</button>
          <a class="btn btn-outline-brand" href="{{ url_for('admin_dashboard') }}">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
